<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn&display=swap" rel="stylesheet">

    <title>Background Image</title>
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: #f4ede3;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .bg-box {
            width: 557px;
            height: 570px;
            background-image: url('https://brandio.io/envato/iofrm/html/images/graphic9.svg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .content-box {
            position: relative;
            background: rgb(255, 255, 255);
            padding: 40px 30px;
            height: 400px;
            width: 260px;
            border-radius: 10px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            z-index: 2;


            text-align: center;
            color: #000;
        }

        .box1 {
            border: none;
            margin: 10px;
            border-radius: 10px;
            background-color: #f7f7f7;
            padding: 16px;
            width: 100%;
            box-sizing: border-box;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background-color: #4a90e2;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            margin-left: 0;

        }

        .btn-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            align-items: baseline;
        }

        .text {
            font-size: 12px;
        }


        .social-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .social-button {
            display: flex;
            align-items: center;
            background-color: #f8f8f8;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .social-button i {
            width: 20px;
            height: 20px;
            font-size: 12px;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 6px;
        }

        .facebook i {
            background-color: #3b5998;
        }

        .google i {
            background-color: #db4437;
        }

        .linkedin i {
            background-color: #0077b5;
        }
    </style>
</head>

<body>
    <main>
        <form>
            <div class="bg-box">
                <div class="content-box">
                    <h2>خوش آمدید</h2>
                    <p>یک حساب کاربری بسازید</p>
                    <input class="box1" type="email" placeholder="ایمیل"><br>
                    <input class="box1" type="password" placeholder="رمز عبور">
                    <div class="btn-row">
                        <button class="btn">ورود</button>
                        <span class="text">رمز عبور را فراموش کرده‌اید؟</span>
                    </div>
                    <div class="social-buttons">
                        <button class="social-button facebook">
                            <i class="fab fa-facebook-f"></i> Facebook
                        </button>
                        <button class="social-button google">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button class="social-button linkedin">
                            <i class="fab fa-linkedin-in"></i> Linkedin
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </main>
</body>

</html>
